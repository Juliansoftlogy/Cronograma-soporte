<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador Cronograma · Soporte Softlogy</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg:#eaeef4;--surface:#fff;--surface-2:#f6f8fc;--ink:#16233d;--muted:#64708a;--faint:#9aa5b8;
    --line:#e0e6f0;--line-strong:#cdd6e6;--brand:#2563eb;--brand-dark:#1d4ed8;--ok:#16a34a;--warn:#d97706;--err:#dc2626;--teams:#6264a7;
    --t-anyely:#0d9488;--t-samuel:#ea580c;--t-jose:#4f46e5;--t-evelio:#db2777;--t-jackson:#7c3aed;
    --e-preventivo:#006100;--e-rutina:#64748b;--e-implementacion:#1e3a8a;--e-actualizacion:#7c3aed;--e-despliegue:#7c4a1e;--e-conciliacion:#2563a8;--e-pruebas:#b91c1c;--e-reunion:#1f3864;--e-documentacion:#6d28d9;--e-seguimiento:#059669;--e-auditoria:#713f12;--e-coordinacion:#a16207;
    --radius:12px;--shadow:0 1px 2px rgba(16,32,64,.04),0 6px 20px rgba(16,32,64,.05);
  }
  *{box-sizing:border-box}html,body{margin:0;padding:0;height:100%}
  body{font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45}
  .app{display:flex;flex-direction:column;min-height:100vh}
  header.topbar{background:linear-gradient(120deg,#0f2f6e,var(--brand));color:#fff;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;gap:20px;box-shadow:0 2px 10px rgba(15,47,110,.18);position:sticky;top:0;z-index:30}
  .topbar .brand h1{margin:0;font-size:18px;font-weight:700;letter-spacing:-.3px}
  .topbar .brand .sub{font-size:11.5px;opacity:.82;margin-top:2px}
  .topbar .metrics{display:flex;gap:22px}.topbar .metric{text-align:right}
  .topbar .metric .n{font-size:19px;font-weight:700;line-height:1}
  .topbar .metric .l{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;opacity:.78;margin-top:3px}
  .layout{flex:1;display:grid;grid-template-columns:288px 1fr;gap:18px;padding:18px;max-width:1600px;width:100%;margin:0 auto;align-items:start}
  .sidebar{display:flex;flex-direction:column;gap:14px;position:sticky;top:78px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .card .card-h{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;padding:12px 14px 0;display:flex;justify-content:space-between;align-items:center}
  .card .card-h .gear{background:none;border:none;cursor:pointer;color:var(--faint);font-size:14px;padding:0}
  .card .card-h .gear:hover{color:var(--ink)}
  .card .card-b{padding:12px 14px 14px}
  .add-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .add-btn{display:flex;flex-direction:column;align-items:flex-start;gap:3px;padding:10px;border:1px solid var(--line);background:var(--surface-2);border-radius:9px;cursor:pointer;text-align:left;font-size:12px;font-weight:600;color:var(--ink);transition:.13s;line-height:1.15}
  .add-btn .ico{font-size:16px}.add-btn .cap{font-size:10px;font-weight:500;color:var(--muted)}
  .add-btn:hover{border-color:var(--brand);background:#eff4ff;transform:translateY(-1px)}
  .data-row{display:flex;gap:8px}.data-row .btn{flex:1}
  .btn{padding:9px 12px;border:1px solid var(--line);background:var(--surface);border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:600;color:var(--ink);display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:.13s}
  .btn:hover{border-color:var(--line-strong);background:var(--surface-2)}
  .btn.primary{background:var(--brand);color:#fff;border-color:var(--brand)}.btn.primary:hover{background:var(--brand-dark)}
  .btn.teams{background:var(--teams);color:#fff;border-color:var(--teams)}.btn.teams:hover{filter:brightness(1.08)}
  .btn.ghost{background:transparent;border-color:transparent;color:var(--muted)}.btn.ghost:hover{background:var(--surface-2);color:var(--ink)}
  .btn.danger{color:var(--err)}.btn.danger:hover{background:var(--err);color:#fff;border-color:var(--err)}
  .btn.block{width:100%}.btn.sm{padding:6px 10px;font-size:11.5px}
  .legend{display:flex;flex-direction:column;gap:7px}
  .legend .row{display:flex;align-items:center;gap:9px;font-size:12.5px}
  .legend .dot{width:11px;height:11px;border-radius:50%;flex:none}
  .legend .row .mail{color:var(--faint);font-size:10.5px;margin-left:auto}
  .conn-status{display:flex;align-items:center;gap:8px;font-size:12.5px;margin-bottom:10px}
  .conn-status .led{width:9px;height:9px;border-radius:50%;background:var(--faint);flex:none}
  .conn-status.on .led{background:var(--ok)}.conn-status.err .led{background:var(--err)}
  .conn-sub{font-size:11px;color:var(--muted);margin:8px 0 10px;line-height:1.45}
  .toggle-line{display:flex;align-items:center;justify-content:space-between;font-size:12px;margin-top:10px}
  .switch{position:relative;width:38px;height:21px}.switch input{display:none}
  .switch .track{position:absolute;inset:0;background:var(--line-strong);border-radius:999px;transition:.15s;cursor:pointer}
  .switch .track::after{content:"";position:absolute;top:2px;left:2px;width:17px;height:17px;background:#fff;border-radius:50%;transition:.15s}
  .switch input:checked + .track{background:var(--teams)}.switch input:checked + .track::after{transform:translateX(17px)}
  details.guide>summary{list-style:none;cursor:pointer;font-size:11px;font-weight:700;color:var(--teams);margin-top:10px}
  details.guide>summary::-webkit-details-marker{display:none}
  details.guide ol{margin:8px 0 0;padding-left:18px;font-size:11px;color:var(--muted);line-height:1.55}
  details.guide code{background:#eef1f7;padding:1px 5px;border-radius:4px;font-size:10.5px}
  .warn-inline{background:#fef3c7;border-left:3px solid var(--warn);padding:8px 10px;font-size:11px;border-radius:6px;margin-bottom:10px;line-height:1.45}
  details.preview-wrap>summary{list-style:none;cursor:pointer;padding:12px 14px;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;display:flex;align-items:center;justify-content:space-between}
  details.preview-wrap>summary::-webkit-details-marker{display:none}
  details.preview-wrap>summary .chev{transition:.15s}details.preview-wrap[open]>summary .chev{transform:rotate(90deg)}
  .preview-box{background:#0e1729;color:#d7deea;font-family:"SF Mono",Menlo,Consolas,monospace;font-size:10.5px;padding:12px;margin:0 12px 12px;border-radius:8px;max-height:240px;overflow:auto;white-space:pre;line-height:1.55}
  .main{display:flex;flex-direction:column;gap:14px;min-width:0}
  .toolbar{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:10px 12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .pick{display:flex;align-items:center;justify-content:center}
  .pick input{width:16px;height:16px;cursor:pointer;accent-color:var(--teams)}
  .ev-parts{display:flex;flex-wrap:wrap;gap:5px;margin:5px 0 2px}
  .pchip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;background:var(--surface-2);border:1px solid var(--line);font-size:11px;font-weight:600;color:var(--text)}
  .pchip .pdot{width:8px;height:8px;border-radius:50%}
  .avatar.multi{font-size:12px}
  .bulkbar{display:flex;gap:8px;align-items:center;font-size:11.5px;color:var(--muted);margin-bottom:10px;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:7px 10px}
  .bulkbar .lbl{font-weight:600;color:var(--text)}
  .bulkbar a{color:var(--brand);cursor:pointer;font-weight:600;padding:3px 9px;border:1px solid var(--line-strong);border-radius:6px;background:var(--surface)}
  .bulkbar a:hover{background:var(--surface-2)}
  .bulkbar .count{margin-left:auto;color:var(--muted);font-weight:600}
  .agenda-head{font-weight:700;color:var(--text);margin-bottom:10px;font-size:13px;text-transform:capitalize}
  .month-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:10px;font-weight:700;color:var(--text);text-transform:capitalize}
  .month-nav button{border:1px solid var(--line);background:var(--surface);width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:16px;color:var(--muted)}
  .month-nav button:hover{background:var(--surface-2)}
  .month-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));width:100%;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--line);gap:1px}
  .month-dow{background:var(--surface-2);padding:10px 8px;font-size:10.5px;font-weight:700;color:var(--muted);text-align:center;letter-spacing:.4px;text-transform:uppercase}
  .month-cell{background:var(--surface);min-height:118px;padding:7px 7px;display:flex;flex-direction:column;gap:3px;min-width:0;overflow:hidden;transition:background .1s}
  .month-cell.out{background:#f7f9fc}
  .month-cell.out .month-daynum{color:var(--faint)}
  .month-cell.today{background:#f2f7ff}
  .month-daynum{font-size:12px;font-weight:700;color:var(--text);width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:2px}
  .month-cell.today .month-daynum{background:var(--brand);color:#fff}
  .month-ev{font-size:10px;line-height:1.3;padding:3px 7px;border-radius:6px;background:var(--surface-2);border-left:3px solid #888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;max-width:100%;box-sizing:border-box}
  .month-ev .me-t{color:var(--muted)}
  .month-more{font-size:9.5px;color:var(--brand);font-weight:700;padding-left:4px;margin-top:1px}
  .month-cell.has{cursor:pointer;transition:background .1s}
  .month-cell.has:hover{background:#eef4ff}
  .month-hint{font-size:11px;color:var(--faint);margin-top:10px;text-align:center}
  .day-list{display:flex;flex-direction:column;gap:8px}
  .day-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border:1px solid var(--line);border-radius:9px;background:var(--surface)}
  .di-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
  .di-body{flex:1;min-width:0}
  .di-subj{font-size:13px;font-weight:600;color:var(--text)}
  .di-meta{display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap}
  .di-time{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums}
  .di-actions{display:flex;gap:6px;flex-shrink:0}
  .view-switch{display:inline-flex;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:3px}
  .view-switch button{border:none;background:transparent;padding:7px 14px;border-radius:7px;font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer;transition:.13s;display:inline-flex;align-items:center;gap:6px}
  .view-switch button.active{background:var(--surface);color:var(--brand);box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .filters{display:flex;gap:8px;flex:1;align-items:center;flex-wrap:wrap;justify-content:flex-end}
  .filters input,.filters select{padding:7px 10px;border:1px solid var(--line);border-radius:8px;font-size:12.5px;font-family:inherit;background:var(--surface);color:var(--ink)}
  .filters input.grow{flex:1;min-width:160px;max-width:300px}
  .filters input:focus,.filters select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(37,99,235,.14)}
  .filter-count{font-size:11.5px;color:var(--muted);font-weight:600;white-space:nowrap}
  .board{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .day{border-bottom:1px solid var(--line)}.day:last-child{border-bottom:none}
  .day-h{position:relative;z-index:1;display:flex;align-items:baseline;gap:10px;padding:11px 16px;background:var(--surface-2);border-bottom:1px solid var(--line)}
  .day-h .dow{font-size:13.5px;font-weight:700;text-transform:capitalize}.day-h .date{font-size:12px;color:var(--muted)}
  .day-h .badge{margin-left:auto;font-size:11px;font-weight:600;color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:2px 10px}
  .day-h.today .dow{color:var(--brand)}
  .day-h.today::before{content:"HOY";font-size:9px;font-weight:800;letter-spacing:.5px;color:#fff;background:var(--brand);border-radius:4px;padding:2px 6px;align-self:center}
  .act{display:grid;grid-template-columns:30px 5px 104px 130px 1fr auto;align-items:center;gap:12px;padding:10px 16px 10px 0;border-bottom:1px solid var(--line);background:var(--surface);transition:background .1s}
  .act:last-child{border-bottom:none}.act:hover{background:var(--surface-2)}
  .act.teams{background:var(--surface)}
  .act .stripe{align-self:stretch;border-radius:3px}
  .act .time{font-size:12px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums}
  .act .time small{display:block;color:var(--faint);font-weight:500}.act .time .nextday{color:var(--warn);font-weight:700}
  .act .who{display:flex;align-items:center;gap:7px}
  .act .avatar{width:26px;height:26px;border-radius:50%;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none}
  .act .who .name{font-size:12.5px;font-weight:600}
  .act .body .subj{font-size:13px;font-weight:600}
  .act .body .desc{font-size:11.5px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}
  .act .body .meta{display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap}
  .plan-pill{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:5px;font-size:9.5px;font-weight:700;cursor:pointer;user-select:none;border:1px solid transparent}
  .plan-pill.yes{background:#dcfce7;color:#166534;border-color:#bbf7d0}
  .plan-pill.no{background:#f1f5f9;color:#64748b;border-color:#e2e8f0}
  .plan-pill:hover{filter:brightness(.97)}
  .state-pill{display:inline-block;padding:2px 8px;border-radius:5px;font-size:9.5px;font-weight:700;cursor:pointer;border:1px solid transparent}
  .state-pill.st-sent{background:#e0e7ff;color:#3730a3;border-color:#c7d2fe}
  .state-pill.st-pend{background:#fef3c7;color:#92400e;border-color:#fde68a}
  .state-pill.st-part{background:#ede9fe;color:#5b21b6;border-color:#ddd6fe}
  .state-pill:hover{filter:brightness(.96)}
  .act.conflict{box-shadow:inset 4px 0 0 var(--err)}
  .conflict-pill{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:5px;font-size:9.5px;font-weight:700;background:#fee2e2;color:#b91c1c;border:1px solid #fecaca}
  .conf-count{color:var(--err);font-weight:700}
  .teams-toggle{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);font-weight:600;cursor:pointer;white-space:nowrap}
  .teams-toggle input{width:15px;height:15px;accent-color:var(--teams);cursor:pointer}
  .teams-pill{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:5px;background:var(--teams);color:#fff;font-size:9.5px;font-weight:700}
  .span-tag{display:inline-block;padding:2px 7px;border-radius:5px;font-size:9.5px;font-weight:700;background:#fef3c7;color:#92400e}
  .cats{font-size:10.5px;color:var(--faint)}
  .row-actions{display:flex;gap:2px;padding-right:8px}
  .icon-btn{background:transparent;border:none;cursor:pointer;padding:5px 7px;border-radius:6px;font-size:14px;color:var(--faint);text-decoration:none}
  .icon-btn:hover{background:#edf1f7;color:var(--ink)}.icon-btn.del:hover{background:var(--err);color:#fff}
  .week-scroll{overflow-y:auto;overflow-x:hidden;max-height:72vh}.week-grid{display:grid;position:relative;width:100%}
  .week-corner{position:sticky;left:0;top:0;z-index:6;background:var(--surface-2);border-right:1px solid var(--line);border-bottom:1px solid var(--line)}
  .week-daycol-h{position:sticky;top:0;z-index:5;background:var(--surface-2);border-bottom:2px solid var(--line);border-left:1px solid var(--line);padding:10px 10px;text-align:center}
  .week-daycol-h .dow{font-size:12px;font-weight:700;text-transform:capitalize}.week-daycol-h .date{font-size:10.5px;color:var(--muted)}
  .week-daycol-h.today{background:#e8f0ff;box-shadow:inset 0 -2px 0 var(--brand)}.week-daycol-h.today .dow{color:var(--brand)}
  .hour-label{position:sticky;left:0;z-index:4;background:var(--surface);border-right:1px solid var(--line);border-bottom:1px dashed var(--line);font-size:10px;color:var(--faint);text-align:right;padding:2px 6px 0 0}
  .hour-cell{border-left:1px solid var(--line);border-bottom:1px dashed var(--line)}
  .daycol-track{position:relative;border-left:1px solid var(--line);min-width:0;overflow:hidden}
  .evt{position:absolute;left:2px;right:2px;border-radius:7px;padding:4px 6px;color:#fff;font-size:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.18);border-left:3px solid rgba(255,255,255,.6);box-sizing:border-box;transition:transform .08s}
  .evt:hover{transform:scale(1.01);z-index:20;box-shadow:0 3px 8px rgba(0,0,0,.25)}
  .evt .eh{font-weight:700;opacity:.95}.evt .et{font-size:9.5px;opacity:.9}.evt .es{font-weight:600}
  .evt.teams{border-left:3px dashed rgba(255,255,255,.85)}
  .evt .et{font-weight:700;line-height:1.1}.evt .es{opacity:.92}.evt .eh{opacity:.82;font-size:9.5px;font-variant-numeric:tabular-nums}
  .evt .cross{display:inline-block;margin-top:2px;font-size:9px;font-weight:700;background:rgba(255,255,255,.25);padding:1px 5px;border-radius:4px}
  .empty{text-align:center;padding:54px 20px;color:var(--muted)}.empty .big{font-size:30px;margin-bottom:8px}.empty .hint{font-size:12.5px;color:var(--faint);margin-top:4px}
  .modal-overlay{position:fixed;inset:0;background:rgba(15,25,45,.5);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(2px)}
  .modal-overlay.open{display:flex}
  .modal{background:#fff;border-radius:14px;max-width:820px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 24px 50px rgba(0,0,0,.28)}.modal.narrow{max-width:560px}
  .modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 22px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;z-index:2}
  .modal-header h3{margin:0;font-size:16px}.modal-body{padding:20px 22px}
  .modal-footer{padding:14px 22px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:#fff}
  .close-x{background:none;border:none;font-size:24px;cursor:pointer;color:var(--muted);line-height:1}
  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:13px 16px}
  .form-grid label,.fld label{display:block;font-size:10.5px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:4px;letter-spacing:.4px}
  .fld{margin-bottom:14px}.fld .hint{font-size:11px;color:var(--faint);margin-top:4px;line-height:1.4}
  input[type=text],input[type=date],input[type=time],input[type=number],select,textarea{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:7px;font-size:13px;font-family:inherit;background:#fff;color:var(--ink)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(37,99,235,.14)}
  textarea{resize:vertical;min-height:62px}
  .field-datetime{display:grid;grid-template-columns:1.3fr 1fr;gap:8px}
  .tech-checkboxes,.day-toggles{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
  .tech-chip,.day-toggle{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;background:var(--surface-2);border-radius:999px;cursor:pointer;font-size:12px;font-weight:600;user-select:none;border:1px solid var(--line);transition:.1s}
  .tech-chip input{display:none}.tech-chip:hover,.day-toggle:hover{background:#e7edf7}
  .tech-chip.checked,.day-toggle.checked{background:var(--brand);color:#fff;border-color:var(--brand)}.tech-chip.checked::before{content:"✓ "}
  .info-box{background:#eff6ff;border-left:3px solid var(--brand);padding:10px 14px;font-size:12px;color:var(--ink);border-radius:6px;margin-bottom:14px;line-height:1.5}

function ymd(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function toMin(hm){ const [h,m] = (hm||"0:0").split(":").map(Number); return h*60 + (m||0); }
function addMinutes(dateStr, hm, addMin){ const d = new Date(dateStr + "T00:00:00"); d.setMinutes(d.getMinutes() + toMin(hm) + addMin); return { date: ymd(d), hm: `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}` }; }
function addDays(dateStr, n){ const d = new Date(dateStr + "T00:00:00"); d.setDate(d.getDate()+n); return ymd(d); }

function absMin(baseDate, dateStr, hm){ const diffDays = Math.round((new Date(dateStr+"T00:00:00") - new Date(baseDate+"T00:00:00")) / 86400000); return diffDays*1440 + toMin(hm); }

function restoreModalDraft(d){ if(!d) return; const body=document.getElementById("modalBody"); Object.entries(d.single||{}).forEach(([n,v])=>{ const el=body.querySelector('[name="'+n+'"]'); if(el && el.type!=="checkbox" && el.type!=="radio") el.value=v; }); Object.entries(d.multi||{}).forEach(([n,arr])=>{ body.querySelectorAll('[name="'+n+'"]').forEach(el=>{ if(el.type==="checkbox"||el.type==="radio"){ el.checked=arr.includes(el.value); const lab=el.closest(".tech-chip"); if(lab) lab.classList.toggle("checked", el.checked); } }); }); }

/* ---- Filtros + render ---- */
let conflictSet=new Set();
function computeConflicts(){
  const set=new Set();
  const evs=combined().filter(a=>a.tecnico);
  const byTF={};
  evs.forEach(a=>{ const k=a.tecnico+"|"+a.fechaIni; (byTF[k]=byTF[k]||[]).push(a); });
  Object.values(byTF).forEach(list=>{
    for(let i=0;i<list.length;i++) for(let j=i+1;j<list.length;j++){
      const A=list[i],B=list[j];
      const twin=(A.source!==B.source)&&(A.ini===B.ini)&&(A.fin===B.fin)&&(String(A.asunto).includes(B.asunto)||String(B.asunto).includes(A.asunto));
      if(twin) continue;
      const aS=toMin(A.ini), aE=(A.fechaFin!==A.fechaIni?toMin(A.fin)+1440:toMin(A.fin));
      const bS=toMin(B.ini), bE=(B.fechaFin!==B.fechaIni?toMin(B.fin)+1440:toMin(B.fin));
      if(aS<bE && bS<aE){ set.add(A.id); set.add(B.id); }
    }
  });
  return set;
}
function sameEvent(a,b){ return a.tecnico&&b.tecnico&&a.tecnico===b.tecnico&&a.fechaIni===b.fechaIni&&a.ini===b.ini&&a.fin===b.fin&&(String(a.asunto).includes(b.asunto)||String(b.asunto).includes(a.asunto)); }
function combined(){
  const tm=showTeams?teamsEvents.map(e=>({...e,source:"teams"})):[];
  let loc=activities.map(a=>({...a,source:"local"}));
  if(tm.length) loc=loc.filter(l=>!tm.some(t=>sameEvent(t,l)));
  return [...loc,...tm];
}
function getFiltered(){

let monthCursor=null;
function fmtAmPm(hm){ let [h,m]=(hm||"0:0").split(":").map(Number); const ap=h<12?"AM":"PM"; let hh=h%12; if(hh===0) hh=12; return m?`${hh}:${String(m).padStart(2,"0")} ${ap}`:`${hh} ${ap}`; }

  if(!evs.length){ body.innerHTML=`<div class="empty"><div>Sin eventos este día.</div></div>`; }
  else body.innerHTML=`<div class="day-list">`+evs.map(a=>{
    const color=a.source==="teams"?"var(--teams)":(a.tecnico?((TEAM[a.tecnico]&&TEAM[a.tecnico].color)||"#888"):"var(--teams)");
    const cross=a.fechaFin!==a.fechaIni;
    return `<div class="day-item"><span class="di-dot" style="background:${color}"></span><div class="di-body"><div class="di-subj">${escapeHtml((a.tecnico?a.tecnico+" - ":"")+a.asunto)}</div><div class="di-meta"><span class="di-time">${a.ini}–${a.fin}${cross?` (termina ${fmtShort(a.fechaFin)})`:""}</span><span class="state-pill ${a.sent?"st-sent":"st-pend"}">${a.sent?"Enviado":"Pendiente"}</span><span class="plan-pill ${(a.plannerV||"Si")==="Si"?"yes":"no"}">${(a.plannerV||"Si")==="Si"?"Planner":"sin Planner"}</span></div></div><div class="di-actions">${a.source==="teams"?`<span class="teams-pill">Teams</span>`:`<button class="icon-btn" onclick="closeDayModal();openEdit('${a.id}')">Editar</button><button class="icon-btn del" onclick="delRow('${a.id}');openDay('${ds}')">Eliminar</button>`}</div></div>`;
  }).join("")+`</div>`;
  document.getElementById("dayOverlay").classList.add("open");
}
function closeDayModal(){ document.getElementById("dayOverlay").classList.remove("open"); }
let weekCursor=null;
function mondayOf(dateStr){ const d=new Date(dateStr+"T00:00:00"); const dow=(d.getDay()+6)%7; d.setDate(d.getDate()-dow); return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function changeWeek(delta){ const d=new Date((weekCursor||mondayOf(todayStr()))+"T00:00:00"); d.setDate(d.getDate()+delta*7); weekCursor=`${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; renderSchedule(); }
function renderWeek(list){
  if(!weekCursor){ weekCursor=mondayOf(todayStr()); }
  const dates=[]; { const base=new Date(weekCursor+"T00:00:00"); for(let i=0;i<7;i++){ const d=new Date(base); d.setDate(base.getDate()+i); dates.push(`${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`); } }
  const wk=list.filter(a=>dates.includes(a.fechaIni));
  let minH=24,maxH=0;
  wk.forEach(a=>{ const cross=a.fechaFin!==a.fechaIni||toMin(a.fin)<=toMin(a.ini); const s=toMin(a.ini),e=cross?1440:toMin(a.fin); minH=Math.min(minH,Math.floor(s/60)); maxH=Math.max(maxH,Math.ceil(e/60)); });
  if(minH>=maxH){ minH=7; maxH=20; }
  minH=Math.max(0,minH); maxH=Math.min(24,Math.max(maxH,minH+1));
  const startMin=minH*60,totalMin=(maxH-minH)*60,PX=1.0,trackH=totalMin*PX,today=todayStr();
  const rango=`${fmtShort(dates[0])} – ${fmtShort(dates[6])}`;
  let html=`<div class="month-nav"><button onclick="changeWeek(-1)">‹</button><span>Semana ${rango}</span><button onclick="changeWeek(1)">›</button></div>`;
  const cols=`56px repeat(7, minmax(0, 1fr))`;
  html+=`<div class="week-scroll"><div class="week-grid" style="grid-template-columns:${cols}"><div class="week-corner"></div>`;
  dates.forEach(fecha=>{ const {dow,date}=fmtDayLong(fecha); html+=`<div class="week-daycol-h ${fecha===today?'today':''}"><div class="dow">${dow}</div><div class="date">${date}</div></div>`; });
  html+=`<div style="position:relative">`;
  for(let h=minH;h<maxH;h++) html+=`<div class="hour-label" style="height:${60*PX}px">${String(h).padStart(2,"0")}:00</div>`;
  html+=`</div>`;
  dates.forEach(fecha=>{
    let track=`<div class="daycol-track" style="height:${trackH}px">`;
    for(let h=minH;h<maxH;h++) track+=`<div class="hour-cell" style="position:absolute;top:${(h-minH)*60*PX}px;left:0;right:0;height:${60*PX}px"></div>`;
    const dayEvs=wk.filter(a=>a.fechaIni===fecha).map(a=>{ const cross=a.fechaFin!==a.fechaIni||toMin(a.fin)<=toMin(a.ini); return {a,s:toMin(a.ini),e:cross?1440:toMin(a.fin),cross}; }).sort((x,y)=>x.s-y.s||x.e-y.e);
    const endCols=[];
    dayEvs.forEach(ev=>{ let placed=false; for(let i=0;i<endCols.length;i++){ if(ev.s>=endCols[i]){ ev.col=i; endCols[i]=ev.e; placed=true; break; } } if(!placed){ ev.col=endCols.length; endCols.push(ev.e); } });
    const ncols=Math.max(1,endCols.length);
    dayEvs.forEach(ev=>{ const a=ev.a; const isT=a.source==="teams"; const color=isT?"var(--teams)":(a.tecnico?((TEAM[a.tecnico]&&TEAM[a.tecnico].color)||"#888"):"var(--teams)");
      const top=(ev.s-startMin)*PX,height=Math.max(24,(ev.e-ev.s)*PX),wPct=100/ncols,leftPct=ev.col*wPct;
      const clk=isT?"":`onclick="openEdit('${a.id}')"`;
      track+=`<div class="evt ${isT?'teams':''}" style="top:${top}px;height:${height}px;left:calc(${leftPct}% + 2px);width:calc(${wPct}% - 4px);right:auto;background:${color};cursor:${isT?'default':'pointer'}" title="${escapeHtml((a.tecnico||(isT?'Teams':''))+' · '+a.asunto)}" ${clk}><div class="eh">${a.ini}–${a.fin}</div><div class="et">${escapeHtml(a.tecnico||(isT?'Teams':''))}</div><div class="es">${escapeHtml(a.asunto)}</div>${ev.cross?`<span class="cross">→ ${fmtShort(a.fechaFin)}</span>`:""}</div>`;
    });
    track+=`</div>`; html+=track;
  });
  html+=`</div></div>`; return html;
}
function refresh(){
  const selT=document.getElementById("filterTech"),selD=document.getElementById("filterDate");
  const curT=selT.value,curD=selD.value,all=combined();
  const techsSet=[...new Set(all.map(a=>a.tecnico).filter(Boolean))].sort();
  const dtsSet=[...new Set(all.map(a=>a.fechaIni))].sort();
  selT.innerHTML=`<option value="">Todos los técnicos</option>`+techsSet.map(t=>`<option value="${t}" ${curT===t?'selected':''}>${t}</option>`).join('');
  selD.innerHTML=`<option value="">Todas las fechas</option>`+dtsSet.map(d=>`<option value="${d}" ${curD===d?'selected':''}>${d}</option>`).join('');
  const si=document.getElementById("sentInfo"); if(si){ const env=activities.filter(a=>a.sent).length; const base = `Enviadas ${env} · Pendientes ${activities.length-env}`; si.textContent = base; }
  renderLegend(); renderSchedule();
}
function renderLegend(){ document.getElementById("legend").innerHTML=TECHS.map(t=>{ const c=activities.filter(a=>a.tecnico===t).length; return `<div class="row"><span class="dot" style="background:${TEAM[t].color}"></span><span>${t}</span><span class="mail">${c||""}</span></div>`; }).join(""); }
function setFlowUrl(){
  const v=prompt("Pega la URL HTTP del flujo (del disparador 'Cuando se recibe una solicitud HTTP'):", flowUrl||"");
  if(v!==null){ flowUrl=v.trim(); try{localStorage.setItem(FLOWURL_KEY,flowUrl);}catch(e){} toast(flowUrl?"URL guardada":"URL borrada","ok"); refresh(); }
}
async function sendToFlow(resendAll, auto){
  if(!flowUrl){ if(auto) return; setFlowUrl(); if(!flowUrl) return; }
  const picked = activities.filter(a=>a.pick!==false);
  const pend = resendAll ? picked : picked.filter(a=>!a.sent);
  if(!pend.length){ if(!auto) toast("No hay actividades seleccionadas para enviar.","ok"); return; }
  if(!auto){ const cf=computeConflicts(); if(pend.some(a=>cf.has(a.id))) toast("⚠ Ojo: hay choques de horario en lo que vas a enviar","err"); }
  const iso=(d,hm)=>`${d}T${hm}:00`;
  const payload={ actividades: pend.map(a=>{ const t=TEAM[a.tecnico]||{}; return {
    Asunto:`${a.tecnico} - ${a.asunto}`, CorreoAsignado:t.correo||"", Plan:t.plan||"", Deposito:t.deposito||"",
    FechaInicio:iso(a.fechaIni,a.ini), FechaFin:iso(a.fechaFin,a.fin), Responsable:a.tecnico,
    Descripcion:a.descripcion||"", Categorias:(a.categorias||[]).join(", "), PlannerVerificacion:(a.plannerV||"Si"),
    AsistentesOpcionales:(a.categorias||[]).filter(n=>n!==a.tecnico).map(n=>(TEAM[n]&&TEAM[n].correo)||"").filter(Boolean).join("; "),
    FechaEntregablePlanner:iso(a.fechaFin,a.fin) }; }) };
  try{
    await fetch(flowUrl,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},body:JSON.stringify(payload)});
    pend.forEach(a=>{ a.sent=true; a.pick=false; }); saveState(); refresh();
    toast(`Enviadas ${pend.length} al flujo. Verifica en Teams/Planner.`,"ok");
  }catch(e){ toast("No se pudo enviar (¿URL correcta y archivo servido en http?): "+(e.message||e),"err"); }
}
function toggleSent(id){ const a=activities.find(x=>x.id===id); if(!a) return; a.sent=!a.sent; saveState(); refresh(); toast(a.sent?"Marcada como enviada":"Marcada como pendiente","ok"); }
function togglePick(id){ const a=activities.find(x=>x.id===id); if(!a) return; const nv=(a.pick===false); if(a.groupId){ activities.forEach(x=>{ if(x.groupId===a.groupId) x.pick=nv; }); } else { a.pick=nv; } saveState(); refresh(); }
function pickAll(v){ activities.forEach(a=>a.pick=v); saveState(); refresh(); toast(v?"Todas marcadas":"Todas desmarcadas","ok"); }
function delRow(id){ activities=activities.filter(a=>a.id!==id); saveState(); refresh(); }
function togglePlanner(id){ const a=activities.find(x=>x.id===id); if(!a) return; a.plannerV=(a.plannerV||"Si")==="Si"?"No":"Si"; saveState(); refresh(); toast(a.plannerV==="Si"?"Irá a Planner":"Solo evento (sin Planner)","ok"); }
function dupRow(id){ const a=activities.find(x=>x.id===id); if(!a) return; activities.push({...a,id:uid()}); saveState(); refresh(); toast("Fila duplicada","ok"); }
function escapeHtml(s=""){ return String(s).replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch])); }

/* ---- Export / Import CSV (solo locales) ---- */
function buildCsvRow(a){ const t=TEAM[a.tecnico]; if(!t) return null; const iso=(d,hm)=>`${d}T${hm}:00`; return [`${a.tecnico} - ${a.asunto}`,t.correo,t.plan,t.deposito,iso(a.fechaIni,a.ini),iso(a.fechaFin,a.fin),a.tecnico,a.descripcion,a.categorias.join(", "),(a.plannerV||"Si"),iso(a.fechaFin,a.fin)]; }
function buildCsvText(){ const rows=[...activities].sort((a,b)=>(a.fechaIni+a.ini).localeCompare(b.fechaIni+b.ini)); const lines=[CSV_HEADERS.join("\t")]; rows.forEach(a=>{ const r=buildCsvRow(a); if(r) lines.push(r.join("\t")); }); return lines.join("\n"); }
function renderPreview(){ document.getElementById("preview").textContent=buildCsvText()||"—"; }
function copyCsv(){ navigator.clipboard.writeText(buildCsvText()).then(()=>toast("CSV copiado al portapapeles","ok"),()=>toast("No se pudo copiar","err")); }
function exportCsv(){
  if(!activities.length) return toast("No hay actividades locales para exportar","err");
  const blob=new Blob([buildCsvText()],{type:"text/tab-separated-values;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const dates=[...new Set(activities.map(x=>x.fechaIni))].sort();
  const label=dates.length?`${dates[0]}_${dates[dates.length-1]}`:"cronograma";
  const a=document.createElement("a"); a.href=url; a.download=`CALENDARIO_${label}.csv`; a.click(); URL.revokeObjectURL(url); toast("CSV descargado","ok");
}
function importRow(c){ // c = array de 11 celdas (strings)
  if(!c || c.length<11) return false;
  const [asuntoFull,correo,plan,deposito,fechaIniStr,fechaFinStr,responsable,descripcion,categorias,plannerVer]=c.map(x=>String(x==null?"":x));
  if(!fechaIniStr) return false;
  const [fIni,iniT]=fechaIniStr.split("T"),[fFin,finT]=fechaFinStr.split("T");
  let asunto=asuntoFull; if(asunto.startsWith(responsable+" - ")) asunto=asunto.slice(responsable.length+3);
  activities.push({id:uid(),fechaIni:fIni,ini:(iniT||"00:00").slice(0,5),fechaFin:fFin||fIni,fin:(finT||"00:00").slice(0,5),tecnico:responsable,asunto,descripcion,categorias:categorias.split(",").map(s=>s.trim()).filter(Boolean),plannerV:(plannerVer||"Si").trim()==="No"?"No":"Si"});
  return true;
}
function importFile(){
  const inp=document.createElement("input"); inp.type="file"; inp.accept=".csv,.tsv,.xlsx,.xls";
  inp.onchange=e=>{ const file=e.target.files[0]; if(!file) return;
    const isXlsx=/\.(xlsx|xls)$/i.test(file.name);
    const before=activities.length;
    if(isXlsx){
      if(typeof XLSX==="undefined") return toast("Para .xlsx se necesita conexión a internet (librería no cargó).","err");
      const reader=new FileReader();
      reader.onload=ev=>{
        try{
          const wb=XLSX.read(new Uint8Array(ev.target.result),{type:"array"});
          const ws=wb.Sheets[wb.SheetNames[0]];
          const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:""});
          rows.slice(1).forEach(r=>{ if(r && r.length>=11 && String(r[4]).trim()) importRow(r); });
          saveState(); refresh(); toast(`Importadas ${activities.length-before} filas`,"ok");
        }catch(err){ toast("No se pudo leer el Excel: "+(err.message||err),"err"); }
      };
      reader.readAsArrayBuffer(file);
    } else {
      const reader=new FileReader();
      reader.onload=ev=>{
        const lines=ev.target.result.split(/\r?\n/).filter(Boolean); const [header,...rest]=lines;
        if(header.split("\t").length!==11) return toast("Formato inesperado (11 columnas esperadas)","err");
        rest.forEach(line=>importRow(line.split("\t")));
        saveState(); refresh(); toast(`Importadas ${activities.length-before} filas`,"ok");
      };
      reader.readAsText(file,"utf-8");
    }
  };
  inp.click();
}
function exportXlsx(){
  if(!activities.length) return toast("No hay actividades para exportar","err");
  if(typeof XLSX==="undefined") return toast("Para .xlsx se necesita conexión a internet (librería no cargó).","err");
  const rows=[...activities].sort((a,b)=>(a.fechaIni+a.ini).localeCompare(b.fechaIni+b.ini)).map(buildCsvRow).filter(Boolean);
  const aoa=[CSV_HEADERS,...rows];
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  ws["!cols"]=CSV_HEADERS.map((h,i)=>({wch:[34,30,30,30,20,20,14,40,18,16,20][i]||16}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Prod");
  const dates=[...new Set(activities.map(x=>x.fechaIni))].sort();
  const label=dates.length?`${dates[0]}_${dates[dates.length-1]}`:"cronograma";
  XLSX.writeFile(wb,`CRONOGRAMA_${label}.xlsx`);
  toast("Excel descargado (hoja 'Prod')","ok");
}
function clearAll(){ if(!activities.length) return; if(!confirm(`¿Borrar las ${activities.length} actividades? (No afecta el calendario de Teams)`)) return; activities=[]; saveState(); refresh(); toast("Actividades borradas","ok"); }

function verifyFlowData(){
  const out=document.getElementById("verifyOut");
  out.style.display="";
  if(!activities.length){ out.innerHTML=`<span style="color:var(--muted)">No hay actividades locales para verificar.</span>`; return; }
  const problems=[];
  activities.forEach(a=>{
    const t=TEAM[a.tecnico];
    if(!t){ problems.push(`«${a.asunto}»: técnico "${a.tecnico}" no está en el equipo (no habrá Plan/Depósito).`); return; }
    if(!t.correo) problems.push(`«${a.asunto}»: ${a.tecnico} sin correo → el evento de calendario no se asigna.`);
    if(!t.plan) problems.push(`«${a.asunto}»: ${a.tecnico} sin Plan → no se crea la tarea de Planner.`);
    if(!t.deposito) problems.push(`«${a.asunto}»: ${a.tecnico} sin Depósito (bucket) de Planner.`);
    if(absMin(a.fechaIni,a.fechaFin,a.fin)<=absMin(a.fechaIni,a.fechaIni,a.ini)) problems.push(`«${a.asunto}»: fin no es posterior al inicio.`);
  });
  const okCount=activities.length-new Set(problems.map(p=>p.split("»")[0])).size;
  const planners=[...new Set(activities.map(a=>a.tecnico))].filter(t=>TEAM[t]).map(t=>`${t} → Plan ${TEAM[t].plan.slice(0,6)}… / Bucket ${TEAM[t].deposito.slice(0,6)}…`);
  const nPlan=activities.filter(a=>(a.plannerV||"Si")==="Si").length, nNo=activities.length-nPlan;
  let html=`<div style="font-weight:700;margin-bottom:4px">${activities.length} actividad(es): ${nPlan} a Planner, ${nNo} solo evento.</div>`;
  html+=`<div style="color:var(--muted)">${planners.join("<br>")}</div>`;
  if(problems.length){
    html+=`<div style="color:var(--err);font-weight:700;margin-top:8px">${problems.length} aviso(s):</div><ul style="margin:4px 0;padding-left:16px;color:var(--err)">${problems.slice(0,8).map(p=>`<li>${escapeHtml(p)}</li>`).join("")}</ul>`;
    if(problems.length>8) html+=`<div style="color:var(--err)">…y ${problems.length-8} más.</div>`;
  } else {
    html+=`<div style="color:var(--ok);font-weight:700;margin-top:8px">✓ Todo listo para la prueba: cada fila tiene correo, Plan y Depósito válidos.</div>`;
  }
  out.innerHTML=html;
}
function pad2(n){ return String(n).padStart(2,"0"); }
function splitDT(v){ let str=(v&&typeof v==="object")?(v.dateTime||v.DateTime||""):(v||""); str=String(str).trim(); if(!str) return {date:"",hm:"00:00"}; str=str.replace(" ","T"); return {date:str.slice(0,10), hm:str.length>=16?str.slice(11,16):"00:00"}; }
function splitDTco(v){
  let str=(v&&typeof v==="object")?(v.dateTime||v.DateTime||""):(v||"");
  str=String(str).trim(); if(!str) return {date:"",hm:"00:00"};
  str=str.replace(" ","T");
  let iso=str;
  if(!/[Zz]$|[+\-]\d\d:?\d\d$/.test(iso)) iso=iso.replace(/\.\d+$/,"")+"Z";
  const d=new Date(iso);
  if(isNaN(d.getTime())) return {date:str.slice(0,10), hm:str.length>=16?str.slice(11,16):"00:00"};
  d.setUTCHours(d.getUTCHours()-5);
  return { date:`${d.getUTCFullYear()}-${pad2(d.getUTCMonth()+1)}-${pad2(d.getUTCDate())}`, hm:`${pad2(d.getUTCHours())}:${pad2(d.getUTCMinutes())}` };
}
function normalizeTeams(raw){
  return (Array.isArray(raw)?raw:[]).map((e,i)=>{
    const asunto=e.asunto||e.subject||e.Asunto||"(sin título)";
    const ini=splitDTco(e.inicio||e.start||e.Inicio); const fin=splitDTco(e.fin||e.end||e.Fin);
    let org=e.organizador||e.organizer||""; if(org&&typeof org==="object") org=(org.emailAddress&&(org.emailAddress.name||org.emailAddress.address))||org.name||org.address||"";
    let tecnico=null; let mt=String(asunto).match(/^([A-Za-zÁÉÍÓÚáéíóúÑñ]+)\s*-/); if(mt){ const hit=TECHS.find(t=>t.toLowerCase()===mt[1].toLowerCase()); if(hit) tecnico=hit; } if(!tecnico){ mt=String(asunto).match(/-\s*([A-Za-zÁÉÍÓÚáéíóúÑñ]+)\s*$/); if(mt){ const hit=TECHS.find(t=>t.toLowerCase()===mt[1].toLowerCase()); if(hit) tecnico=hit; } }
    return { id:"tm-"+i, source:"teams", tecnico, asunto, descripcion:"", organizador:String(org||""), fechaIni:ini.date, ini:ini.hm, fechaFin:(fin.date||ini.date), fin:fin.hm };
  }).filter(x=>x.fechaIni);
}
async function loadTeamsEvents(manual){
  try{
    const bust=TEAMS_JSON_URL+(TEAMS_JSON_URL.includes("?")?"&":"?")+"t="+Date.now();
    const res=await fetch(bust,{cache:"no-store"});
    if(!res.ok) throw new Error("HTTP "+res.status);
    const data=await res.json();
    teamsEvents=normalizeTeams(data); refresh();
    if(manual) toast(`Calendario de Teams actualizado (${teamsEvents.length})`,"ok");
  }catch(e){ teamsEvents=[]; if(manual) toast("No se pudo leer el calendario de Teams: "+(e.message||e),"err"); refresh(); }
}
function toggleTeams(v){ showTeams=v; refresh(); }
function setTeamsFlowUrl(){ const v=prompt("Pega la URL HTTP del Flujo 2 (el disparador 'Cuando se recibe una solicitud HTTP' del flujo que LEE los eventos de Teams):", teamsFlowUrl||""); if(v!==null){ teamsFlowUrl=v.trim(); try{localStorage.setItem(TEAMS_FLOWURL_KEY,teamsFlowUrl);}catch(e){} toast(teamsFlowUrl?"URL de actualización guardada":"URL borrada","ok"); } }
async function refreshTeamsViaFlow(){
  if(!teamsFlowUrl){ setTeamsFlowUrl(); if(!teamsFlowUrl) return; }
  const link=document.getElementById("teamsRefreshLink"); if(link) link.textContent="Actualizando…";
  try{
    await fetch(teamsFlowUrl,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},body:"{}"});
  }catch(e){ if(link) link.textContent="Actualizar"; return toast("No se pudo solicitar la actualización: "+(e.message||e),"err"); }
  toast("Solicitud enviada. Esperando a que el flujo publique los eventos…","");
  let tries=0;
  const poll=async()=>{ tries++; await loadTeamsEvents(false); if(tries>=5){ if(link) link.textContent="Actualizar"; toast(`Eventos de Teams actualizados (${teamsEvents.length})`,"ok"); return; } setTimeout(poll,3000); };
  setTimeout(poll,3000);
}
/* ---- Init ---- */
loadState();
refresh();
loadTeamsEvents(false);
setInterval(()=>{ if(showTeams) loadTeamsEvents(false); }, 60000); // auto-refresco cada 60 segundos
